name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run smoke tests (offline)
        run: pytest tests/ -q
      - name: Verify every exercise solution passes its evaluation
        run: |
          for d in udemy_exercises/ex_*/; do
            (cd "$d" && python -m unittest evaluation) || exit 1
          done
      - name: Verify assignment solutions score 100%
        run: |
          for n in 1 2 3 4 5 6 7; do
            python grader/grade.py "$n" --solution || exit 1
          done
